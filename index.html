<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ansoby - Under Construction</title>
    <link rel="icon" href="/favicon.ico">
    <meta property="og:title" content="ansoby">
    <meta property="og:description" content="Under construction">
    <meta property="og:image" content="https://ansoby.com/og.png">
    <meta property="og:url" content="https://ansoby.com">
    <meta property="og:type" content="website">
    <style>
      :root {
        --bg: #efefef;
        --text: #666666;
        --text-dark: #4f4f4f;
        --accent: #f57c00;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text-dark);
      }

      body {
        min-height: 100vh;
        position: relative;
        overflow: hidden;
      }

      /* ← SVGロゴ用に変更 */
      .logo-img {
        position: absolute;
        top: 28px;
        left: 36px;
        height: clamp(34px, 4vw, 64px);
        width: auto;
        display: block;
        user-select: none;
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }

      .terminal {
        width: min(760px, 100%);
        color: var(--text-dark);
      }

      .line {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        white-space: nowrap;
        font-family: "SFMono-Regular", Menlo, Consolas, Monaco, monospace;
        line-height: 1.35;
      }

      .line+.line {
        margin-top: 14px;
      }

      .prompt {
        color: #808080;
      }

      .command {
        font-size: clamp(22px, 3vw, 42px);
        letter-spacing: 0.01em;
      }

      .status {
        font-size: clamp(24px, 3.4vw, 48px);
        color: var(--text-dark);
      }

      .ansoby {
        color: #7a7a7a;
      }

      .ansoby .a1,
      .ansoby .b1 {
        color: var(--accent);
      }

      .dots {
        display: inline-flex;
        min-width: 1.8em;
      }

      .dots span {
        opacity: 0.18;
        color: var(--accent);
        animation: blink 1.3s infinite;
      }

      .dots span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes blink {

        0%,
        20% {
          opacity: 0.18;
        }

        40% {
          opacity: 1;
        }

        100% {
          opacity: 0.18;
        }
      }

      @media (max-width: 640px) {
        .logo-img {
          top: 20px;
          left: 20px;
        }

        .terminal {
          padding-top: 36px;
        }

        .line {
          gap: 0.35rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- SVGロゴに置き換え -->
    <img src="/assets/logo.svg" alt="ansoby logo" class="logo-img">
    <main class="wrap">
      <section class="terminal" aria-label="Under construction status">
        <div class="line command">
          <span class="prompt">$</span>
          <span class="ansoby">
            <span class="a1">a</span>nso<span class="b1">b</span>y </span>
          <span>build</span>
        </div>
        <div class="line status">
          <span class="prompt">&gt;</span>
          <span> constructing <span class="dots" aria-hidden="true">
              <span>.</span><span>.</span><span>.</span>
            </span>
          </span>
        </div>
        <div class="line status">
          <span class="prompt">&gt;</span>
          <span>ansoby orchestrator is coming.</span>
        </div>
      </section>
    </main>
  </body>
</html>
